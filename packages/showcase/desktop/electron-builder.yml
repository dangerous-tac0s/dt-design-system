appId: com.dangerousthings.showcase-desktop
productName: DT Design System Showcase
directories:
  output: release
  buildResources: resources
npmRebuild: false
artifactName: "dt-showcase-desktop-${version}-${arch}.${ext}"
files:
  - dist/**/*
  - package.json
  - "!node_modules"
mac:
  target: [dmg, zip]
win:
  target: [nsis, portable]
linux:
  target: [AppImage, deb]
  category: Development
